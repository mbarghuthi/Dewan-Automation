<scenario keyword="Scenario:" title="TC_001_UOP UOP Create Outgoing">
<step outcome="successful">Given [Navigation] I navigate to &apos;p:dewanUOP&apos;</step>
<step outcome="successful">And [Input] I login as &apos;p:UOPuser.alaa&apos; with password &apos;p:password&apos;</step>

<step outcome="successful">And [Input] I click on &apos;Outgoing Button&apos;</step>
<step outcome="successful">When [Input] Set &apos;Subject Field&apos; value to &apos;random&apos;</step>
<step outcome="successful">And [Input] I select &apos;p:InternalControlAndAuditUnit&apos; from the &apos;Commissioners Exporting&apos; combo box</step>
<step outcome="successful">And [Input] I select &apos;p:TheMinistryOfEducation&apos; from the &apos;Salutation Hand&apos; combo box</step>
<step outcome="successful">And [Input] I click on &apos;Save Button&apos;</step>
<step outcome="successful">And [Action] I get text from &apos;Subject Field&apos; and save it as &apos;SubjectText&apos;</step>
<step outcome="successful">And [Action] I get value from &apos;Outgoing Get Serial Number&apos; and save it as &apos;OutgoingSerialNumberValue&apos;</step>
<step outcome="successful">And [Progress] I wait for &apos;3&apos; sec</step>
<step outcome="successful">And [Input] I click on &apos;OutgoingUsers Directed To&apos;</step>
<step outcome="successful">And [Assertion] Verify &apos;Outgoing User Name Directed To1&apos; equals &apos;p:UOPuser.audit1&apos; text</step>
<step outcome="ignorable">!-- And [Assertion] Verify &apos;Outgoing User Name Directed To2&apos; equals &apos;p:UOPuser.ZainabFarouqa&apos; text</step>
<step outcome="successful">And [Input] I click on &apos;Direction Button&apos;</step>
<step outcome="successful">And [Input] I click on &apos;Approve Button&apos;</step>
<step outcome="successful">And [Progress] I wait for &apos;4&apos; sec</step>
<step outcome="successful">And [Input] I click on &apos;My Processes List Header Button&apos;</step>
<step outcome="successful">And [Assertion] Verify &apos;Process Status&apos; equals &apos;p:ProcessCompletedStatus&apos; text</step>
<step outcome="successful">Then [Input] I click on &apos;logout Button&apos;</step>
<step outcome="successful">And [Assertion] Verify &apos;login Button&apos; is present</step>
<step outcome="successful">And [Input] I login as &apos;p:UOPuser.audit1&apos; with password &apos;p:password&apos;</step>
<step outcome="successful">And [Input] I click on &apos;Tasks To View&apos;</step>
<step outcome="successful">And [Input] I click on &apos;Tasks To View Date&apos;</step>
<step outcome="successful">And [Input] I click on &apos;Tasks To View Date&apos;</step>
<step outcome="successful">And [Assertion] Verify text of &apos;Task List First Subject Text&apos; equals saved value &apos;SubjectText&apos;</step>
<step outcome="successful">And [Input] I click on &apos;View Process Button&apos;</step>
<step outcome="successful">And [Assertion] Verify text of &apos;Subject Field&apos; equals saved value &apos;SubjectText&apos;</step>
<step outcome="successful">And [Assertion] Verify value of &apos;Outgoing Get Serial Number&apos; equals saved value &apos;OutgoingSerialNumberValue&apos;</step>
<step outcome="successful">And [Input] I click on &apos;Direction Button&apos;</step>
<step outcome="successful">And [Input] I click on &apos;View Button&apos;</step>
<step outcome="successful">And [Progress] I wait for &apos;3&apos; sec</step>
