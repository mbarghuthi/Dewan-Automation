<scenario keyword="Scenario:" title="TC_004_UOP_001 UOP Create Generalization">
<step outcome="successful">Given [Navigation] I navigate to &apos;p:dewanUOP&apos;</step>
<step outcome="successful">And [Input] I login as &apos;p:UOPuser.alaa&apos; with password &apos;p:password&apos;</step>
<step outcome="successful">And [Input] I click on &apos;Add Process Button&apos;</step>
<step outcome="successful">And [Input] I click on &apos;Generalization Button&apos;</step>
<step outcome="successful">When [Input] Set &apos;Subject Field&apos; value to &apos;random&apos;</step>
<step outcome="successful">And [Input] Set &apos;Generalization Date Field&apos; value to &apos;date&apos;</step>
<step outcome="successful">And [Action] I get value from &apos;Generalization Get Year&apos; and save it as &apos;GeneralizationYearValue&apos;</step>
<step outcome="successful">And [Assertion] Verify &apos;GeneralizationYearValue&apos; equals current year</step>
<step outcome="successful">And [Input] I click on &apos;Save Button&apos;</step>
<step outcome="successful">And [Action] I get value from &apos;Generalization Get Serial Number&apos; and save it as &apos;GeneralizationSerialNumberValue&apos;</step>
<step outcome="successful">And [Action] I get text from &apos;Subject Field&apos; and save it as &apos;GeneralizationSubjectText&apos;</step>
<step outcome="successful">And [Input] I hover and click on &apos;All Task Header Button&apos;</step>
<step outcome="successful">And [Input] I click on &apos;My Processes List Header Button&apos;</step>
<step outcome="successful">And [Assertion] Verify &apos;Process Status&apos; equals &apos;p:ProcessUnCompletedStatus&apos; text</step>
